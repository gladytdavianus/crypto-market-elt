version: 2

models:
  - name: dim_coins
    description: "Dimension table containing metadata for each coin (id, symbol, name)."
    columns:
      - name: coin_id
        description: "Unique identifier for the coin, e.g. 'bitcoin'."
        tests:
          - unique
          - not_null

  - name: fact_coin_prices
    description: "Fact table with daily price, market cap, and volume per coin. Combines daily snapshots and historical backfill, deduplicated by (coin_id, price_date)."
    columns:
      - name: coin_id
        description: "Foreign key referencing dim_coins.coin_id."
        tests:
          - not_null
          - relationships:
              to: ref('dim_coins')
              field: coin_id
      - name: price_date
        description: "The calendar date this price record represents."
        tests:
          - not_null
      - name: price_usd
        description: "Price in USD at the given date."
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
            - coin_id
            - price_date
