x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    PYTHONPATH: /opt/airflow
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCP_DATASET_RAW: ${GCP_DATASET_RAW}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/crypto-elt-sa.json
    COINGECKO_BASE_URL: ${COINGECKO_BASE_URL}
    COINGECKO_API_KEY: ${COINGECKO_API_KEY}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./extraction:/opt/airflow/extraction
    - ./dbt_project:/opt/airflow/dbt_project
    - ./credentials:/opt/airflow/credentials
    - ./logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres_airflow:
      condition: service_healthy

services:
  postgres_airflow:
    image: postgres:16
    container_name: crypto_elt_airflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

volumes:
  airflow_postgres_data:
